<button onclick="loadHistory()">View History</button>

<pre id="history"></pre>

<script>

function loadHistory(){

fetch("/history")
.then(res=>res.json())
.then(data=>{
document.getElementById("history").innerText =
JSON.stringify(data,null,2)
})

}

</script>
